# ===================================================================
#  Test profile - used automatically by the integration tests.
#  Runs against an in-memory H2 database so tests need no PostgreSQL
#  install and leave nothing behind.
# ===================================================================

# H2 in PostgreSQL-compatibility mode, created fresh for each test run.
spring.datasource.url=jdbc:h2:mem:bookingtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Advisory locks are a PostgreSQL feature; H2 does not have them, so the
# tests turn the call off. Functional behaviour (201 vs 409) is still
# verified here; the true concurrency guarantee is proven by JMeter
# against real PostgreSQL (see the jmeter/ folder).
app.advisory-lock.enabled=false
