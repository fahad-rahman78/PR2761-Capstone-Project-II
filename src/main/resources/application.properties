# ===================================================================
#  Main configuration - used when the app runs normally (PostgreSQL).
#  Values can be overridden with environment variables, which is handy
#  so you do not have to hard-code your real password in the file.
# ===================================================================

spring.application.name=booking-system

# --- Database connection -------------------------------------------
# Change the database name / user / password to match your machine,
# or set the environment variables shown in the defaults below.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/booking_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate -----------------------------------------------
# ddl-auto=update lets Hibernate create/upgrade the tables from our
# entity classes on startup, so you do not have to run schema.sql by
# hand just to try the app. (For production you would normally use
# 'validate' plus a migration tool, but 'update' is fine for a capstone.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Set to true if you want to see the SQL Hibernate runs in the console.
spring.jpa.show-sql=false

# --- Connection pool (HikariCP) ------------------------------------
# A bigger pool helps when JMeter fires many requests at once.
spring.datasource.hikari.maximum-pool-size=20

# --- Our own flag --------------------------------------------------
# PostgreSQL advisory locks are the core of the concurrency strategy,
# so they are ON here. They are turned OFF in the test profile because
# the H2 test database does not support them.
app.advisory-lock.enabled=true

# Serve the frontend (static/index.html) from the root URL.
server.port=8080
